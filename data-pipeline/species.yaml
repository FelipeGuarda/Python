# Species catalog — Bosque Pehuén monitoring ecosystem
# Canonical source for data-pipeline, camera-traps, and plataforma-territorial.
# Generated: 2026-04-24
#
# Fields per entry:
#   latin            — scientific name (required, unique, cross-project join key)
#   spanish          — canonical Spanish common name (required)
#   spanish_aliases  — accent-strip / synonym variants for reviewer "Otro (especificar)" matching
#   english          — CLIP text prompt (used by camera-traps classifier; optional)
#   taxonomic_group  — mamifero | ave | invertebrado (reptil reserved for future)
#   is_invasive      — true for introduced / feral species (defaults false)
#   is_priority      — true for conservation-priority natives (defaults false)
#
# Lookup order for SPANISH_TO_LATIN: lowercased spanish, then each lowercased alias.
# Species added 2026-04-16 (Chingue, Cachaña, Fío-fío, Libélula) came from reviewer
# comments and were not part of the original 27-entry CLIP catalog — they have no
# english prompt and are NOT passed to the CLIP classifier.

species:
  # ── Mamíferos ──
  - latin: Lycalopex culpaeus
    spanish: Zorro culpeo
    spanish_aliases: [zorro]
    english: culpeo fox
    taxonomic_group: mamifero

