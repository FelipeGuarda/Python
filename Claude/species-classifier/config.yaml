# ─── Paths ────────────────────────────────────────────────────────────────────
campaign_dir: "C:/Users/USUARIO/SynologyDrive/2. Camaras trampa (SC)/SynologyDrive/DATOS_GRILLA CÁMARAS TRAMPA/2. CAMPAÑAS DE RECOLECCION DE IMAGENES/Primavera 2025"
megadetector_json: "timelapse_recognition_file.json"
database:         "CamtrapDB_Primavera2025.ddb"
input_csv:        "new_labeled_data_CamptrapDP.csv"
output_csv:       "new_labeled_data_classified.csv"

# ─── Detection filtering ───────────────────────────────────────────────────────
animal_confidence_threshold: 0.38
animal_category: "1"          # category '1' = animal in timelapse_recognition_file.json

# ─── CLIP model ───────────────────────────────────────────────────────────────
clip_model: "openai/clip-vit-base-patch32"

# ─── Output metadata ──────────────────────────────────────────────────────────
classified_by:        "CLIP zero-shot"
classification_method: "machine"

# ─── Species list ─────────────────────────────────────────────────────────────
# spanish  → written to observationComments
# latin    → written to scientificName (CamtrapDP standard)
# english  → used as CLIP text prompt (model is English-trained)
