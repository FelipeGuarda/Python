name: pehuen-analysis
# Base packages installed from conda-forge.
# camtrapR is NOT on conda-forge — install it from CRAN after env creation:
#   conda activate pehuen-analysis
#   Rscript setup_packages.R
channels:
  - conda-forge
dependencies:
  - r-base>=4.4
  - r-ggplot2
  - r-dplyr
  - r-tidyr
  - r-stringr
  - r-lubridate
  - r-readr
  - r-here
  - r-patchwork
  - r-sf          # spatial features and GeoJSON reading
  - r-circular    # circular statistics (required by camtrapR)
  - r-scales      # axis formatting in ggplot2
