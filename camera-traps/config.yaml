# ─── Paths ────────────────────────────────────────────────────────────────────
campaign_dir: "C:\\Users\\USUARIO\\Desktop\\BP Mayo 2026\\SynologyDrive"
megadetector_json: "timelapse_recognition_file.json"
input_csv:        "ImageData_animals.csv"
output_csv:       "ImageData_animals_classified.csv"

# ─── Detection filtering ───────────────────────────────────────────────────────
animal_confidence_threshold: 0.38
animal_category: "1"          # category '1' = animal in timelapse_recognition_file.json

# ─── CLIP model ───────────────────────────────────────────────────────────────
clip_model: "openai/clip-vit-base-patch32"
clip_confidence_threshold: 0.28   # scores below this → "No reconocible"

# ─── Output metadata ──────────────────────────────────────────────────────────
classified_by:        "CLIP zero-shot"
classification_method: "machine"

# Species catalog now lives at data-pipeline/species.yaml — loaded via
# classify_campaign.species. Override path with FMA_SPECIES_YAML env var.
